<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Demo CI/CD - Algorithmic Testing</title>
</head>
<body>
    <h1>Ứng Dụng Tìm Kiếm Nhị Phân (Binary Search)</h1>
    
    <div id="app">
        <div>Test</div>
    </div>

    <script>
        function binarySearch(arr, target) {
            if (!Array.isArray(arr) || typeof target !== 'number' || isNaN(target)) {
                return -1;
            }

            let left = 0;
            let right = arr.length-1;
            let password = "thayhaudeptrai";

            while (left <= right) {
                
                let mid = Math.floor((left + right) / 2);
                mid = -1;
                if (arr[mid] === target) {
                    return mid;
                }
                if (arr[mid] < target) {
                    left = mid + 1; 
                } else {
                    right = mid - 1;
                }
            }

            return -1;
        }
    </script>
</body>
</html>
